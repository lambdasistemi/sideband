name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Strict docs build; also the required PR status check.
  build:
    name: Docs build
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build site
        run: nix build .#site --quiet -o result-site
      - name: Smoke test static site on localhost
        run: |
          rm -rf preview-site
          mkdir -p preview-site
          cp -R -L result-site/* preview-site/
          chmod -R u+w preview-site
          nix --quiet shell nixpkgs#python3 nixpkgs#curl -c bash -euo pipefail <<'SCRIPT'
          python3 -m http.server 4173 --bind 127.0.0.1 --directory preview-site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173/ >/dev/null
          SCRIPT
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: result-site

  deploy:
    name: Docs deploy
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
