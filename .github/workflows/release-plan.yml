name: Release Planner

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: release-planner
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Mint a scoped release token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lambdasistemi
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Plan or tag Cabal release
        # Author the release PR with the App token (a real actor) so its
        # pull_request CI runs normally. A PR opened via the default
        # GITHUB_TOKEN is treated as a bot and its workflows are withheld as
        # action_required, leaving the PR permanently BLOCKED with no checks.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/plan
