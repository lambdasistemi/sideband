name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # App token so the release PR is authored by a real actor and its CI
      # runs (GITHUB_TOKEN-authored bot PRs get no checks and stay BLOCKED).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lambdasistemi
          repositories: sideband
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

  publish-linux:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build the tg binary
        run: nix build --quiet .#default -o result-tg
      - name: Stage the release tarball
        run: |
          set -euo pipefail
          tag="${{ needs.release-please.outputs.tag_name }}"
          stage="sideband-${tag}-x86_64-linux"
          mkdir -p "$stage/bin"
          cp -L result-tg/bin/tg "$stage/bin/tg"
          chmod +x "$stage/bin/tg"
          "$stage/bin/tg" --help >/dev/null
          tar -czf "${stage}.tar.gz" "$stage"
      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$tag" \
            "sideband-${tag}-x86_64-linux.tar.gz" --clobber
